) | Greece | PVK | 76 | B | May-Oct | Research-backed dolphin watching, lovely setting |\n| 5 | Lošinj (Adriatic) | Croatia | RJK | 74 | B | May-Oct | Long-established bottlenose dolphin reserve |\n| 6 | Bonifacio Strait (Sardinia) | Italy | OLB | 74 | B | Jun-Sep | Southern edge of the Pelagos Sanctuary |\n| 7 | Costa Blanca (Dénia) | Spain | VLC | 70 | B | May-Oct | Coastal dolphin trips, easy and family-friendly |\n| 8 | Gulf of Corinth | Greece | ATH | 70 | B | May-Oct | Mixed-species dolphin population |\n| 9 | Turkish coast (Bosphorus) | Turkey | IST | 64 | C | May-Sep | Dolphins in the strait and along the coast |\n| 10 | Malta & Sicily | Malta | MLA | 64 | C | Jun-Sep | Occasional dolphin trips, lower densities |\n\nConfidence: High for the top two, Medium below.\n\n## Sources\n1. [Tethys Research Institute - Whales and Dolphins in the Mediterranean](https://whalesanddolphins.tethys.org/) - species present, Pelagos and Ionian research projects\n2. [GetYourGuide - Pelagos Sanctuary Dolphin & Whale Watching 2025](https://www.getyourguide.com/pelagos-sanctuary-l163179/dolphin-whale-watching-tc49/) - current Ligurian Sea trips and departure points\n3. [Travel Science - The Best Places to Spot Dolphins in the Mediterranean](https://travelscience.org/dolphin-watching-in-the-mediterranean/) - dolphin hotspots across the basin\n4. [Pelagos Sanctuary - Official Site](https://pelagos-sanctuary.org/) - sanctuary extent, species and conservation context\n5. [Italia.it - The Pelagos Sanctuary for Mediterranean Marine Mammals](https://www.italia.it/en/liguria/pelagos-marine-mammal-sanctuary) - Ligurian Sea sanctuary overview and access\n6. [FIRMM - Whales and Dolphins in the Strait of Gibraltar](https://www.firmm.org/en/whales-dolphins) - Gibraltar species, orca season, research trips\n7. [Ecobnb - The Pelagos Cetacean Sanctuary in Liguria](https://ecobnb.com/blog/2024/09/pelagos-cetacean-sanctuary-liguria/) - sanctuary biodiversity and responsible watching"},{"key":"windsurf_kitesurf","label":"Windsurfing & Kitesurfing","emoji":"🪁","region":"Europe","subregion":"Mediterranean","topDests":["Tarifa","Alaçatı","Naxos & Paros","Rhodes (Prasonisi)","Lo Stagnone"],"bestWindow":"Jun – Sep","wordCount":1520,"sourcesCount":7,"lastResearched":"2026-06-16","body":"# Windsurfing & Kitesurfing in the Mediterranean\n\n## The Quick Read\nThis is the vibe for people who want the wind, and plenty of it. The Mediterranean has some of\nthe most reliable summer wind in the world, and a few spots here are genuinely\nworld-class. Tarifa, where the Atlantic squeezes into the Mediterranean at the Strait of\nGibraltar, is the wind capital of Europe and the obvious first choice for both\nwindsurfing and kitesurfing. Across the Aegean, the meltemi wind blows for days at a\ntime in summer, which is why the Greek Cyclades, Rhodes, and Turkey's Alaçatı are packed\nwith riders from June to September. There are flat shallow lagoons for beginners and\nhowling open bays for experts. This guide ranks where the wind actually shows up and\nwhere the setup makes it easy to ride.\n\n## Why the Mediterranean Delivers This\nThe region runs on thermal winds you can almost set a watch by. In the Aegean, the\nmeltemi is a strong, dry north wind that funnels between the islands through July and\nAugust, often blowing 20 to 35 knots for days on end, which is exactly what a windsurfer\nor kiter wants. At Tarifa, the Strait acts like a wind tunnel, so the Levante and\nPoniente winds deliver some of the most consistent conditions in Europe across a long\nseason. Turkey's Aegean coast gets its own reliable afternoon thermals at Alaçatı and\nAkyaka. On top of the wind, several spots have the ideal beginner geography: shallow,\nflat lagoons where you can stand up far from shore, like Alaçatı's bay, Sicily's Lo\nStagnone, and the lagoon side of Rhodes' Prasonisi.\n\nThe honest caveats: the very thing that makes summer great here, the meltemi, can blow\ntoo hard for beginners and pin boats in port, and it is gusty. Tarifa is brilliant but\nits wind is famously strong and the town gets busy. The water is also cooler than the\ntropics, comfortable in summer with a shorty, chilly in the shoulder months.\n\n## Where to Go\n\n### Tarifa, Spain: the wind capital of Europe\nTarifa sits at the meeting point of the Atlantic and the Mediterranean, and the Strait of\nGibraltar funnels wind across its long sandy beaches almost relentlessly in season. It is\nthe most established wind destination in Europe, with a deep bench of schools, rental\nshops, and après-ride scene, and it works for both windsurfing and kitesurfing across a\nseason that runs roughly April to October. The wind here leans strong, so it suits\nimprovers and experts best, though the schools handle beginners on the lighter days. Note\nthat Tarifa's wind is Atlantic-influenced through the Strait rather than pure\nMediterranean, which is part of why it is so reliable.\n\n### Alaçatı, Turkey: the beginner-friendly classic\nOn Turkey's Çeşme peninsula, Alaçatı has a wide bay that is shallow and standing-depth far\nfrom shore, blowing into a sheltered arc, which makes it one of the best places in the\nworld to learn windsurfing. The thermal wind is reliable through summer, the water warms\ninto the mid-twenties, and the big beach clubs make gear and instruction easy. It is a\nwindsurf institution that has added strong kite facilities, and the town behind it is one\nof the prettiest on the coast.\n\n### The Cyclades, Greece: meltemi country\nNaxos and Paros are the heart of Greek wind riding. Naxos' Mikri Vigla and Paros' Pounda\nand Golden Beach catch the full meltemi, with flat-water and wave options depending on the\nday and the side of the beach. The scene is social, the schools are good, and you can pair\nhard riding with classic Cycladic island life. This is summer-peaked: the wind is at its\nmost reliable, and strongest, in July and August.\n\n### Rhodes (Prasonisi), Greece: the two-sided lagoon\nPrasonisi, at the southern tip of Rhodes, is a sandspit with flat lagoon water on one side\nand choppier sea on the other, so beginners and experts ride the same spot in different\nconditions. The meltemi funnels down here reliably, and the long season and warm water\nmake it a favorite. It is remote enough that most people stay right at the spot.\n\n### Lo Stagnone and Sardinia, Italy: flat-water and variety\nSicily's Lo Stagnone, a shallow lagoon near Marsala, has become one of the Mediterranean's\ntop flat-water kite spots, knee-to-waist deep over a wide area, which is ideal for learning\nand for freestyle. Sardinia offers more variety: Porto Pollo in the north is a windy\nstrait with a flat bay and a wave side, and Punta Trettu in the south is a flat lagoon for\nbeginners.\n\n### Worth the wind: Karpathos, Akyaka, Lefkada, Essaouira, Costa Brava\nKarpathos in Greece gets a fierce, reliable meltemi that experts love. Akyaka on Turkey's\nGulf of Gökova has a dependable afternoon thermal over flat water. Lefkada's Vassiliki bay\nis a long-running windsurf classic. Essaouira on Morocco's Atlantic coast blows hard and\nsteady (flagged as Atlantic rather than Mediterranean). Spain's Empuriabrava on the Costa\nBrava catches the tramuntana for kiting.\n\n## When to Go\nThe core season is June through September, and for the Aegean spots that is also when the\nmeltemi is most reliable, peaking in July and August when it can blow hard for a week\nstraight. Tarifa has the longest season, from April into October, thanks to the Strait. If\nyou are learning, aim for June or September, when the wind is present but a little less\nferocious and the crowds are thinner. Outside summer the wind becomes less dependable and\nthe water cools, so the shoulder months suit committed riders chasing specific systems\nrather than casual sessions.\n\n## What to Watch Out For\nMatch the spot to your level honestly. The meltemi at full strength and Tarifa's Levante\nare no place for a first lesson, and a 35-knot day will humble an improver. The good news\nis that the best learning spots, Alaçatı, Lo Stagnone, Prasonisi's lagoon side, are shallow\nand forgiving, so pick those if you are starting out and save the open bays for later.\n\nPlan around the wind, not the calendar. Even in peak season there are light days, so build\nin flexibility and a backup plan rather than booking a single day and hoping. Book gear and\nlessons ahead in July and August, when the popular schools fill.\n\nRespect the conditions and the gear rules. Offshore-leaning wind, strong currents at points\nand straits, and busy line-ups all raise the stakes, so ride within sight of a school or\nwith a buddy, and wear a helmet and impact vest for kiting. Cooler water than people expect\nmeans a shorty wetsuit is worth packing even in summer.\n\n## Who This Is (and Isn't) For\nThis vibe is ideal for windsurfers and kiters of any level who want reliable summer wind, a\nstrong school network, and a social scene on the beach. Beginners are genuinely well served\nat the shallow-lagoon spots, and experts get world-class conditions at Tarifa and in the\nmeltemi. It pairs well with a wider beach or island trip, since the wind tends to come up in\nthe afternoon and leave the mornings free.\n\nIt is a weaker fit for people with no interest in lessons or gear hauling, for anyone who\nneeds guaranteed conditions on a fixed day, and for those who want warm, calm, glassy water,\nwhich is the opposite of the point here. Non-riders in the group will want their own beach\nplan.\n\n## Destination Ranking Snapshot\nScores are 0-100, calibrated within the Mediterranean. See\n[VIBE_RANKING_SYSTEM.md](../VIBE_RANKING_SYSTEM.md) for methodology.\n\n| Rank | Destination | Country | IATA | Score | Tier | Best Window | Why |\n|------|-------------|---------|------|-------|------|-------------|-----|\n| 1 | Tarifa | Spain | GIB | 90 | S | Apr-Oct | Europe's wind capital, both disciplines, deep scene |\n| 2 | Alaçatı | Turkey | ADB | 87 | A | Jun-Sep | Shallow flat bay, reliable wind, beginner heaven |\n| 3 | Naxos & Paros | Greece | PAS | 85 | A | Jun-Sep | Full meltemi, flat and wave options, strong schools |\n| 4 | Rhodes (Prasonisi) | Greece | RHO | 84 | A | Jun-Sep | Two-sided lagoon, all levels, long season |\n| 5 | Lo Stagnone (Marsala) | Italy | TPS | 82 | A | Jun-Sep | Top flat-water kite lagoon, ideal for learning |\n| 6 | Sardinia (Porto Pollo) | Italy | OLB | 82 | A | Jun-Sep | Windy strait plus flat lagoons, real variety |\n| 7 | Karpathos | Greece | AOK | 80 | A | Jun-Sep | Fierce reliable meltemi, expert windsurfing |\n| 8 | Akyaka (Gökova) | Turkey | DLM | 79 | A | Jun-Sep | Dependable afternoon thermal over flat water |\n| 9 | Lefkada (Vassiliki) | Greece | PVK | 78 | A | Jun-Sep | Long-running windsurf classic bay |\n| 10 | Essaouira (Atlantic) | Morocco | ESU | 78 | A | Apr-Sep | Strong steady wind, flagged Atlantic not Med |\n| 11 | Empuriabrava (Costa Brava) | Spain | GRO | 74 | B | Jun-Sep | Tramuntana kiting, flat bay and schools |\n| 12 | Mallorca (Pollença) | Spain | PMI | 73 | B | Jun-Sep | Kite-friendly bays, variable wind |\n| 13 | Kos (Kefalos) | Greece | KGS | 73 | B | Jun-Sep | Windsurf bay, meltemi exposure |\n| 14 | Limassol | Cyprus | LCA | 70 | B | Jun-Sep | Developing kite scene, warm water |\n| 15 | Mondello (Sicily) | Italy | PMO | 69 | B | Jun-Sep | Windsurf bay near Palermo, gustier |\n\nConfidence: High for the top nine, Medium below.\n\n## Sources\n1. [VentoSurf - The 10 Best Kitesurfing Spots in Europe (2026)](https://www.ventosurf.com/blog/best-kitesurfing-spots-europe-2026) - Tarifa and Mediterranean kite spots, conditions and season\n2. [ION CLUB - Why is Alaçatı a Windsurfing Paradise?](https://www.ion-club.net/why-is-alacati-a-windsurfing-paradise/) - shallow bay geography, wind reliability, learning\n3. [Sportif Travel - Alaçatı Beach Resort Windsurf & Kitesurf](https://www.sportif.travel/hotels/117/422/Turkey/Alacati/) - on-site center, gear, water temperature, season\n4. [Kitesurf The World - Greece Kitespot Guide](https://kitesurftheworld.com/kitespots/greece/) - Naxos, Paros, Rhodes, Karpathos spot detail\n5. [Greece Travel Secrets - What is the Meltemi Wind in Greece?](https://www.greecetravelsecrets.com/meltemi-wind/) - meltemi strength, timing, Cyclades effects\n6. [Planet Kitesurf Holidays - Greece](https://www.planetkitesurfholidays.com/countries/greece/grc) - Greek kite spots, lessons, best months\n7. [bstoked - Kitesurfing Greece: All You Need to Know](https://bstoked.net/locations/greece/) - flat vs wave spots, level suitability, season"},{"key":"wine_country","label":"Wine Country & Tastings","emoji":"🍷","region":"Europe","subregion":"Mediterranean","topDests":["Tuscany","Provence","Santorini","Sicily (Etna)","Penedès & Priorat"],"bestWindow":"May – Oct","wordCount":1500,"sourcesCount":7,"lastResearched":"2026-06-16","body":"# Wine Country & Tastings in the Mediterranean\n\n## The Quick Read\nThis is the vibe for slow days among vines, a tasting room with a view, and a long lunch\nthat turns into the afternoon. The Mediterranean is one of the great wine cradles, and the\nregions here pair famous bottles with gorgeous countryside and easy access from the coast.\nTuscany is the headliner: Chianti, Brunello, Super Tuscans, and rolling hills of cypress\nand stone farmhouses. Provence is the rosé heartland, where most of the wine is pink and\nthe lavender fields are next door. Santorini grows ancient Assyrtiko in volcanic ash, and\nSicily's vineyards climb the slopes of Mount Etna. Add Catalonia, Languedoc, Croatia, and\nthe Greek mainland, and you have a region where wine tourism is mature, scenic, and built\nfor visitors. This guide ranks where the tasting trip delivers most.\n\n## Why the Mediterranean Delivers This\nThe climate is the whole story: long warm summers, cooling sea breezes, and poor stony\nsoils that vines love. Wine has been made here for thousands of years, so the regions come\nwith deep tradition, indigenous grapes, and a culture that treats wine as food rather than\nluxury. The visitor side is well developed, with cellar-door tastings, vineyard stays,\nharvest experiences, and wine roads that link estate to estate. Just as important, the wine\nregions sit close to everything else, an hour from the beach, next to the ruins, around the\nhill town, so a tasting day folds easily into a wider trip rather than demanding a dedicated\npilgrimage.\n\nThe honest caveats: peak summer is hot and busy, and the most famous estates in Tuscany,\nProvence, and Santorini book their tasting slots weeks ahead, with some closing for part of\nAugust. Midday heat in the southern regions makes late morning or late afternoon the smart\nwindows. And you need a plan for driving, since tasting and a rental car do not mix, so a\ndriver, a tour, or a base you can walk or cycle from matters.\n\n## Where to Go\n\n### Tuscany, Italy: the icon\nTuscany is the Mediterranean's wine postcard: Chianti Classico between Florence and Siena,\nBrunello around Montalcino, Vino Nobile at Montepulciano, and the Super Tuscans of the\ncoast. The estates range from grand to tiny and family-run, the landscape of vines, olives,\nand hill towns is hard to beat, and the food matches the wine perfectly. It is the most\ndeveloped wine-tourism region here, which means excellent infrastructure and the biggest\ncrowds, so book the marquee cellars ahead and leave time for the back roads.\n\n### Provence, France: rosé country\nProvence produces more rosé than anywhere in France, over 80 percent of its output, and a\ntasting trip here is as much about the setting as the wine: vineyards backed by lavender,\nhilltop villages, and estates like those of Bandol and the Côtes de Provence. Bandol's reds\nand the underrated whites of Cassis reward the curious. It pairs naturally with the Riviera\nand the Calanques, and spring and early autumn are loveliest.\n\n### Santorini, Greece: vines in volcanic ash\nSantorini grows Assyrtiko, a crisp, mineral white, in volcanic soil, with vines trained low\nin basket shapes to survive the wind. Tasting here comes with caldera views and a genuinely\ndistinctive wine you cannot get the same way anywhere else. It is easy to combine with the\nisland's other draws, though it is small and the good wineries get busy at sunset.\n\n### Sicily and the Etna slopes, Italy\nSicily has become one of Italy's most exciting wine regions, led by the vineyards on Mount\nEtna, where Nerello Mascalese reds and mineral whites grow on volcanic terraces at altitude.\nAdd Marsala on the west coast and a wealth of indigenous grapes, and you have a region with\nbig variety and (still) relative value. The Etna wineries pair perfectly with the volcano\nhike.\n\n### Worth the pour: Catalonia, Languedoc, Croatia, the Greek mainland, Puglia\nSpain's Penedès near Barcelona is the home of Cava, and nearby Priorat makes powerful reds in\ndramatic terraced hills. France's Languedoc-Roussillon is a vast, improving, good-value coast\nregion. Croatia's Pelješac peninsula grows robust Plavac Mali, with crisp whites on Korčula.\nGreece's Nemea and the Peloponnese make excellent Agiorgitiko, and Puglia's Primitivo is\nsunshine in a glass.\n\n## When to Go\nThe shoulder seasons are ideal: May to June and September to October bring warm but\ncomfortable weather, green or golden vineyards, and the best of the visiting experience.\nHarvest, roughly late August through October depending on the region and the year, is the\nmost atmospheric time, with the cellars working and grapes coming in, though it is also the\nbusiest for the wineries themselves. Summer is hot and crowded, and many small family\nproducers close for a week or two in August, so plan around that. Winter is quiet, with\nsome estates closed and tastings by appointment only, but it can be a peaceful, low-key time\nto visit the open ones.\n\n## What to Watch Out For\nBook ahead and read the fine print. The famous estates in Tuscany, Provence, and Santorini\nfill tasting slots four to six weeks out in peak season, charge for tastings, and some shut\nfor part of August, so email or reserve early, especially for tours and lunches. Smaller\nproducers are more flexible but still appreciate notice.\n\nSort out the driving. Tasting and driving do not mix, and rural roads, hill bends, and\nenthusiastic pours are a bad combination, so use a driver, a small-group tour, a cycling\nroute, or a base you can reach the cellars from without a car. Confirm how you are getting\nhome before the first glass.\n\nTime it around the heat. In the southern regions, midday in summer is brutal in the\nvineyards, so schedule cellar visits for late morning or after 4pm, carry water, and do not\ntry to cram too many estates into one day; two or three relaxed visits beat a rushed five.\n\n## Who This Is (and Isn't) For\nThis vibe is ideal for travelers who enjoy wine and the slow, scenic countryside that comes\nwith it, for food-and-drink couples, and for anyone who likes meeting producers and learning\nhow a place tastes. It scales from a single half-day tour to a week along a wine road, and it\npairs beautifully with food, hill towns, beaches, and ruins, so it slots into almost any\nMediterranean trip.\n\nIt is a weaker fit for non-drinkers, for travelers on a tight budget at the premium estates,\nand for anyone unwilling to arrange transport or book ahead. Trying to wing the famous\nregions in peak summer with no reservations and a rental car is the reliable way to be\ndisappointed.\n\n## Destination Ranking Snapshot\nScores are 0-100, calibrated within the Mediterranean. See\n[VIBE_RANKING_SYSTEM.md](../VIBE_RANKING_SYSTEM.md) for methodology.\n\n| Rank | Destination | Country | IATA | Score | Tier | Best Window | Why |\n|------|-------------|---------|------|-------|------|-------------|-----|\n| 1 | Tuscany | Italy | FLR | 90 | S | May-Oct | Chianti, Brunello, Super Tuscans; the icon |\n| 2 | Provence | France | MRS | 86 | A | May-Oct | Rosé heartland, lavender-and-vine landscape |\n| 3 | Santorini | Greece | JTR | 84 | A | May-Oct | Volcanic Assyrtiko, caldera-view tastings |\n| 4 | Sicily (Etna) | Italy | CTA | 84 | A | May-Oct | Volcanic-slope reds and whites, big variety |\n| 5 | Penedès & Priorat | Spain | BCN | 83 | A | May-Oct | Cava country plus powerful Priorat reds |\n| 6 | Languedoc-Roussillon | France | MPL | 80 | A | May-Oct | Vast, improving, excellent-value coast region |\n| 7 | Pelješac & Korčula | Croatia | DBV | 79 | A | May-Oct | Robust Plavac Mali and crisp island whites |\n| 8 | Nemea & the Peloponnese | Greece | ATH | 78 | A | May-Oct | Excellent Agiorgitiko, easy from Athens |\n| 9 | Puglia (Primitivo) | Italy | BRI | 78 | A | May-Oct | Sun-soaked southern reds, great value |\n| 10 | Campania (Taurasi) | Italy | NAP | 76 | B | May-Oct | Aglianico reds and Vesuvius-slope wines |\n| 11 | Sardinia (Cannonau) | Italy | OLB | 76 | B | May-Oct | Cannonau reds and Vermentino whites |\n| 12 | Crete | Greece | HER | 74 | B | May-Oct | Indigenous varieties, a rising island scene |\n| 13 | Cyprus (Commandaria) | Cyprus | PFO | 72 | B | May-Oct | Ancient sweet wine and mountain villages |\n| 14 | Mallorca (Binissalem) | Spain | PMI | 70 | B | May-Oct | Island reds, easy day from the coast |\n\nConfidence: High for the top eight, Medium below.\n\n## Sources\n1. [WineTravelGuides - 10 Best Wine Regions to Visit in Summer 2026](https://winetravelguides.com/best-wine-regions-summer-2026) - current visiting picks across Tuscany, Provence and Spain\n2. [Winalist - Provence Wineries to Visit 2026](https://www.winalist.com/regions/provence) - Bandol, Côtes de Provence estates, rosé tastings\n3. [Winedering - Best Wine Tastings and Winery Visits in Tuscany 2026](https://www.winedering.com/wine-tourism_tuscany_g3165361_ta10_wine-tastings) - Chianti and Brunello cellar visits, booking\n4. [Liz Palmer - European Wine Tourism Index 2025](https://liz-palmer.com/european-wine-tourism-index-2025-ranking-europes-leading-wine-destinations/) - ranking of Europe's leading wine-tourism destinations\n5. [WineTourism.com - Tuscany Wine Region Guide](https://www.winetourism.com/wine-region/tuscany/) - sub-zones, grapes and visiting practicalities\n6. [OnlyProvence - Provence Rosé Tasting](https://www.onlyprovence.com/provence-rose-wine-tasting/) - where to taste Provence rosé, estate notes\n7. [Royal Caribbean - Best Wine Regions in Europe](https://www.royalcaribbean.com/inspire/best-wine-regions-in-europe) - Santorini, Sicily and Mediterranean region overview"},{"key":"wreck_cave_diving","label":"Wreck & Cave Scuba Diving","emoji":"🐠","region":"Europe","subregion":"Mediterranean","topDests":["Gozo & Comino","Larnaca (Zenobia)","Malta (Cirkewwa)","Kaş","Cabo de Palos"],"bestWindow":"Jun – Oct","wordCount":1640,"sourcesCount":7,"lastResearched":"2026-06-16","body":"# Wreck & Cave Scuba Diving in the Mediterranean\n\n## The Quick Read\nThe Mediterranean is a different kind of dive trip than the tropics. You come here for\nshipwrecks, caves, walls, and the kind of clear blue water that lets you see a whole\nwreck laid out beneath you, not for dense coral gardens. Malta and its sister island\nGozo are the capital of this vibe: purpose-sunk wrecks you can plan a week around,\nshore-entry caves, and some of the most reliable conditions in Europe. Cyprus holds the\nsingle best wreck in the region, the Zenobia, a ferry the size of a city block resting\non its side off Larnaca. Turkey's Kaş, the Spanish marine reserves at Cabo de Palos and\nthe Medes Islands, and the volcanic walls off Sardinia and Sicily round out a strong\nfield. This guide ranks where the diving is genuinely worth the flights.\n\n## Why the Mediterranean Delivers This\nThe appeal here is structure and water clarity rather than reef life. Centuries of\nmaritime history, two world wars, and a run of deliberate scuttling to create dive\nattractions have left the seabed studded with wrecks, many sitting upright and intact\nin recreational depths. The limestone geology gives you caves, chimneys, and dramatic\ndrop-offs, especially around Malta, Gozo, and Kaş. And because the Mediterranean is low\non plankton in summer and autumn, visibility regularly runs 30 meters or more, which is\nexactly what you want when the point of the dive is the shape of a ship or the mouth of\na cavern.\n\nWhat you give up is biomass. You will see grouper, barracuda, moray, the occasional\nturtle and amberjack, but not the wall-to-wall fish of the Red Sea or Southeast Asia.\nDecades of overfishing thinned the Mediterranean, which is why the protected marine\nreserves, Cabo de Palos, the Medes, Ustica, Port-Cros, stand out so sharply: inside the\nno-take zones the fish come back, and the difference underwater is obvious.\n\n## Where to Go\n\n### Gozo and Comino: the diver's islands\nGozo is where serious Mediterranean divers go. Shore-entry sites ring the island, the\nInland Sea tunnel opens onto a wall, and the Blue Hole is a natural rock pool that\ndrops to a reef and an arch (the famous Azure Window above it collapsed in 2017, but\nthe dive below remains excellent). Comino, the little island between Gozo and Malta,\nadds caves, the P31 patrol-boat wreck, and the bright shallows of the Cominoland and\nSanta Marija sites. Operators are dense, standards are high, and a new fast ferry has\nmade getting over from Malta easier.\n\n### Larnaca, Cyprus: the Zenobia\nIf you only dive one Mediterranean wreck, make it this one. The Zenobia is a 172-meter\nroll-on roll-off ferry that sank on her maiden voyage in 1980 and now lies on her port\nside in 16 to 42 meters of clear water off Larnaca. She is consistently rated among the\ntop wreck dives in the world: trucks still chained to her deck, swim-throughs for\ntrained divers, and a marine reserve's worth of grouper, barracuda, and turtles that\nhave moved in. The wreck suits everyone from a first-timer peering at the hull to a\ntechnical diver penetrating the car decks. Paphos and Protaras add reefs and caves if\nyou want variety.\n\n### Malta (Cirkewwa and the south): the wreck collection\nThe main island is built around its wrecks. Cirkewwa, on the northwest tip, is a\nshore-diveable site with the tugboat Rozi and the patrol boat P29 sitting upright in\nclear water, ideal for building wreck experience. Further round, the Um El Faroud, a\n115-meter oil tanker scuttled as an artificial reef, rests at 36 meters and is one of\nthe great European wreck dives. The HMS Maori and the wrecks off Valletta add WWII\nhistory. Malta dives well most of the year and offers strong value for the quality.\n\n### Kaş, Turkey: walls, canyons, and history\nKaş, on Turkey's Turquoise Coast, is the country's best diving and one of the most\nvaried sites in the Mediterranean: 25-plus dive sites packing wrecks, caves, walls, and\ncanyons into a small area, with comfortable summer water and 30-meter visibility in\nspring and autumn. The Canyon and the Blue Hole are standouts, and the diving runs\nthrough layers of history, from a sunken WWII aircraft to amphorae on the seabed.\nLoggerhead turtles, grouper, and rays are regular company.\n\n### Spain's marine reserves: Cabo de Palos and the Medes\nSpain's Mediterranean coast hides two of the region's best dives, both inside protected\nreserves. Cabo de Palos and the Islas Hormigas off Murcia combine coral-encrusted\nwrecks with big fish: groupers, barracuda, sunfish, and the occasional tuna over\nvolcanic topography. The Medes Islands off L'Estartit on the Costa Brava are a long-\nprotected reserve where the grouper grew huge and tame, with caves and tunnels to\nexplore. Both prove what Mediterranean diving looks like when the fishing stops.\n\n### Worth the tanks: Sardinia, Ustica, Portofino, the Calanques, Croatia\nSardinia's Capo Carbonara reserve has caves, walls, and good clarity. Ustica, off\nSicily, was Italy's first marine reserve and stays clear and fishy. Liguria's Portofino\nreserve holds the Christ of the Abyss statue and a famous wreck. France protects\nPort-Cros and the wrecks off the Var coast. Croatia's Vis offers the Baron Gautsch and\na sunken WWII aircraft. None are at the top of the list, but all reward a diver already\nin the neighborhood.\n\n## When to Go\nThe Mediterranean dive season runs roughly April to November, and the best months are\nJune through October. Water that sits in the high teens Celsius in spring warms into the\nmid to high twenties by late summer, and visibility peaks from late summer into autumn\nwhen the water is calm and plankton is low. Malta and Cyprus can be dived year-round\nwith a thicker wetsuit or a drysuit, and winter is the quiet, cheap, clear season for\nthose who do not mind cooler water. Spring brings green water and cooler temperatures as\nthe sea wakes up. Avoid windy fronts, which shut down the exposed sites for a day or two.\n\n## What to Watch Out For\nMatch the dive to your certification honestly. The headline sites have depth and, in the\ncase of wrecks and caves, overhead environments that demand the right training. The\nZenobia's car decks, the Gozo tunnels, and the Um El Faroud's interior are not casual\nswim-throughs; do the wreck or cave course before you assume you can go inside. Plenty of\neach site is spectacular from the outside at recreational depth.\n\nWater temperature surprises people who picture the Mediterranean as warm. Below the\nthermocline it drops sharply, and a summer surface of 26 degrees can sit over 17-degree\nwater at depth, so dress for the deepest part of the dive. Currents around exposed points\nand the Strait sites can be strong.\n\nBook reserve permits and good operators ahead. The Medes, Cabo de Palos, and several\nItalian reserves cap daily divers and require a licensed center, so walk-ups are not\nguaranteed in peak season. As everywhere, ask the operator what conditions are like that\nweek rather than trusting a brochure photo.\n\n## Who This Is (and Isn't) For\nThis vibe is ideal for certified divers who love structure: wrecks to explore, caves and\ntunnels to thread, walls to drift along, and water clear enough to take it all in. It\nsuits history buffs, photographers who like dramatic light and shape, and divers building\ntoward wreck or technical training. Malta and Cyprus in particular are easy, well-run\nplaces to log a lot of varied dives in a week.\n\nIt is a weaker fit for divers chasing big marine-life numbers and vivid coral, which the\nMediterranean cannot match. Complete beginners can still enjoy try-dives and shallow\nreefs here, but the signature sites reward people with a few dozen dives and the relevant\nspecialties.\n\n## Destination Ranking Snapshot\nScores are 0-100, calibrated within the Mediterranean. See\n[VIBE_RANKING_SYSTEM.md](../VIBE_RANKING_SYSTEM.md) for methodology.\n\n| Rank | Destination | Country | IATA | Score | Tier | Best Window | Why |\n|------|-------------|---------|------|-------|------|-------------|-----|\n| 1 | Gozo & Comino | Malta | MLA | 89 | A | May-Nov | Shore caves, Blue Hole, dense wrecks, top operators |\n| 2 | Larnaca (Zenobia) | Cyprus | LCA | 88 | A | Apr-Nov | Best wreck in the Med, all levels, marine reserve |\n| 3 | Malta (Cirkewwa) | Malta | MLA | 86 | A | May-Nov | Um El Faroud, Rozi, P29; great wreck value |\n| 4 | Kaş | Turkey | DLM | 83 | A | Apr-Nov | Wrecks, caves, walls, canyons in one small area |\n| 5 | Cabo de Palos | Spain | ALC | 81 | A | Jun-Oct | Wrecks plus big-fish reserve, volcanic terrain |\n| 6 | Medes Islands (L'Estartit) | Spain | GRO | 80 | A | Jun-Oct | Long-protected reserve, huge grouper, caves |\n| 7 | Ustica | Italy | PMO | 79 | A | Jun-Oct | Italy's first reserve, clear and fishy |\n| 8 | Sardinia (Capo Carbonara) | Italy | CAG | 78 | A | Jun-Oct | Caves, walls, strong visibility |\n| 9 | Portofino & Ligurian reserve | Italy | GOA | 76 | B | Jun-Oct | Christ of the Abyss, marine park |\n| 10 | Calanques & Port-Cros | France | MRS | 76 | B | Jun-Oct | Protected park plus Var-coast wrecks |\n| 11 | Vis & Croatia wrecks | Croatia | SPU | 75 | B | Jun-Oct | Baron Gautsch, sunken WWII aircraft |\n| 12 | Elba & Tuscan Archipelago | Italy | PSA | 74 | B | Jun-Oct | Wrecks and walls, easy logistics |\n| 13 | Alonissos Marine Park | Greece | JSI | 74 | B | Jun-Oct | Greece's big reserve, Peristera wreck |\n| 14 | Santorini & Crete | Greece | JTR | 72 | B | Jun-Oct | Volcanic walls, caldera; scene improving |\n| 15 | Formentera (Balearics) | Spain | IBZ | 72 | B | Jun-Oct | Clear water, seagrass, easy diving |\n| 16 | Bay of Kotor | Montenegro | TIV | 66 | B | Jun-Oct | Wrecks and walls, smaller scene |\n\nConfidence: High for the top eight, Medium below.\n\n## Sources\n1. [Bluewater Dive Travel - Best Scuba Diving in Malta](https://www.bluewaterdivetravel.com/destination/malta-diving) - Gozo and Malta site overview, wreck and cave inventory, conditions\n2. [Oyster Diving - The Ultimate Guide to Wreck Diving in Malta and Gozo](https://oysterdiving.com/the-ultimate-guide-to-wreck-diving-in-malta-and-gozo/) - Um El Faroud, Karwela, P29, depth and access detail\n3. [Divernet - Scuba Diving in Cyprus: Zenobia Wreck, Reefs & Top Dive Sites](https://divernet.com/world-dives/scuba-diving-in-cyprus-zenobia-wreck-reefs-top-dive-sites-north-and-south/) - Zenobia dimensions, marine life, all-level suitability\n4. [Bluewater Dive Travel - Best Scuba Diving in Turkey](https://www.bluewaterdivetravel.com/destination/scuba-diving-turkey) - Kaş site variety, season, visibility, marine life\n5. [SCUBA News - The Ultimate Guide to Diving in Spain](https://news.scubatravel.co.uk/ultimate-guide-to-diving-in-spain.html) - Cabo de Palos and Medes Islands reserves, big-fish recovery\n6. [Atlantis Gozo - A Quick Take on Malta's 2025 Dive Scene](https://www.atlantisgozo.com/features/total-guide-to-diving-malta-2024/) - 2025 conditions, fast ferry, shoulder-season visibility\n7. [Dream Travel Routes - Kaş Diving Spots: Current Guide 2025](https://www.dreamtravelroutes.com/ka-diving-spots-current-2025/) - current Kaş site list, Canyon and Blue Hole, history dives"},{"key":"island_hopping_sailing","label":"Yacht & Gulet Sailing / Island-Hopping","emoji":"⛵","region":"Europe","subregion":"Mediterranean","topDests":["Dalmatian Coast (Split)","Cyclades (Paros)","Turquoise Coast (Fethiye)","Ionian Islands (Corfu)","Sardinia (La Maddalena)"],"bestWindow":"May – Oct","wordCount":1680,"sourcesCount":7,"lastResearched":"2026-06-16","body":"# Yacht & Gulet Sailing and Island-Hopping in the Mediterranean\n\n## The Quick Read\nThis is the vibe for waking up in a different cove every morning. The Mediterranean\nis the best place in the world to do it because the islands sit close together, the\nsummer winds are predictable, and there is a marina or a quiet anchorage every few\nhours of sailing. You do not need to own a boat or know how to sail. You can hire a\nskippered yacht, join a cabin charter with strangers who become friends, or book a\ncrewed Turkish gulet where someone else cooks lunch while you swim. Croatia's\nDalmatian coast is the easiest place to start, with short hops between walled towns.\nThe Greek Cyclades give you the postcard, with stronger wind and more swagger.\nTurkey's Turquoise Coast is the most relaxed, drifting between pine-backed bays and\nsunken ruins. This guide ranks where the sailing actually delivers.\n\n## Why the Mediterranean Delivers This\nThree things make this region built for sailing. First, geography. In Croatia you can\nsee your next island from the deck of the last one, so a day's sail is a couple of\nrelaxed hours, not a grueling passage. The Cyclades, the Ionian, and Turkey's coast\nall string their anchorages close enough that a beginner on a skippered boat never\nfeels out of their depth. Second, the wind. From June to September the thermal winds\nrun on a schedule you can plan around: the meltemi in the Aegean, the maestral along\nthe Adriatic, the meltemi's gentler cousins in Turkey. They tend to build in the\nafternoon and drop at night, which is close to ideal. Third, the charter industry is\nmature. Bases in Split, Athens, Lavrio, Corfu, Göcek, and Olbia turn out thousands of\nwell-kept boats, and the cabin-charter model means you can buy a single berth rather\nthan the whole yacht.\n\nThe honest caveat: July and August are crowded and hot, prices peak, and the popular\nanchorages off Hvar or Mykonos fill by mid-afternoon. The Aegean meltemi can also\nblow hard enough in high summer to pin you in port for a day, which is why confident\nsailors love it and nervous first-timers sometimes do not. Shoulder season fixes most\nof this.\n\n## Where to Go\n\n### Dalmatian Coast, Croatia: the easiest place to learn the rhythm\nCroatia is where most people should start. From Split or Dubrovnik you can island-hop\nthrough Hvar, Vis, Korčula, and Mljet on short, sheltered legs, tying up each night in\na town with a fortress, a fish restaurant, and a morning market. The marina network is\ndense and well-run, the maestral wind is steady without being violent, and the cabin\nand skippered-charter market is enormous. Vis, the farthest of the big islands, stayed\na military zone for decades and still feels quieter than the rest. The trade-off is\nthat the secret is out, so the marquee anchorages get busy in peak weeks.\n\n### Cyclades, Greece: the iconic hop, for confident crews\nThis is the Greece of the imagination: white villages above blue water, Paros and\nNaxos and Ios and the dramatic caldera at Santorini. The sailing is genuinely good,\nbut the meltemi that funnels through the Cyclades in July and August is the real deal,\nso this is better with a skipper or as an experienced crew. Charter from Paros, Athens,\nor Lavrio and you can build a loop that mixes party islands with near-empty ones like\nFolegandros or Sifnos. Go in late May, June, or September for the same islands with\ncalmer water and lighter crowds.\n\n### Turquoise Coast, Turkey: the Blue Cruise on a gulet\nTurkey's southwest coast invented the relaxed end of this vibe. The Blue Cruise puts\nyou on a broad wooden gulet with a crew, drifting between Fethiye, Göcek, Kekova, and\na string of bays that road traffic never reaches. You swim off the back, eat what the\ncook brings up, and tie up beside the sunken Lycian city at Kekova or below Simena's\nhilltop castle. It is the lowest-effort way to do this, and the value is strong\ncompared with Croatia or the French islands. Bodrum and the Gökova gulf to the north\noffer the same gulet model with more nightlife at the start and end.\n\n### Ionian Islands, Greece: the gentle one\nOn the west side of Greece the wind is softer and the sailing is forgiving, which\nmakes Corfu, Lefkada, Kefalonia, and the little islands around them the best Greek\nchoice for first-timers and families. Short hops, green hills instead of bare rock,\nand easy anchorages off Meganisi and the Lefkada coast. You give up some of the\nCyclades drama and gain a much lower stress level.\n\n### Sardinia and Corsica: the wild, upscale corner\nThe Maddalena archipelago between Sardinia and Corsica is some of the clearest water\nin the Mediterranean, a scatter of granite islets and white-sand bays you reach from\nOlbia or Palau. Costa Smeralda brings the superyacht glamour and the prices to match.\nAcross the strait, Bonifacio's cliffs and the southern Corsican coast are spectacular.\nCharter demand here has climbed, with operators reporting more week-long bookings\ntracing Corsica and Sardinia. The catch is cost and slightly longer open-water legs.\n\n### Worth the lines: Saronic Greece, Balearics, Aeolian Islands, Montenegro\nThe Saronic and Argolic gulfs near Athens (Hydra, Spetses, Poros) make an easy\nshort-trip loop with quick airport access. The Balearics put Formentera's sandbars a\nday-sail from Ibiza. Italy's Aeolian Islands off Sicily pair sailing with live\nvolcanoes. The Bay of Kotor in Montenegro is a stunning fjord-like sail, though the\ncruising ground beyond it is small.\n\n## When to Go\nThe season runs roughly May through October. The sweet spot is late May to June and\nagain in September to early October: warm water, reliable but manageable wind, and a\nfraction of the August crowd. July and August deliver the strongest, most dependable\nwind, which experienced sailors prize, along with the highest prices, the busiest\nanchorages, and real heat. In the Aegean specifically, the August meltemi can blow 30\nknots for days, so build slack into the plan. By late October most charter bases wind\ndown and the weather turns unsettled.\n\n## What to Watch Out For\nBook the boat and the skipper early. The good crewed gulets and the better skippered\nyachts in Croatia and Greece sell out months ahead for peak weeks, and the cheap late\ndeals are usually the tired boats. Read what is actually included: fuel, the final\nclean, the skipper's food, marina fees, and the tourist tax often sit on top of the\nheadline charter price and add up fast.\n\nMatch the cruising ground to your nerve. The Ionian, the Saronic, and the Croatian\nislands are gentle. The open Cyclades in high summer are not, and a windy forecast\nthere is not the trip for a first-timer without a skipper. If you are prone to\nseasickness, the short-hop grounds are far kinder than long passages.\n\nAnchoring etiquette matters and is increasingly enforced. Several marine parks and\nseagrass beds, including around the Maddalena and parts of Greece, restrict where you\ncan drop the hook, and fines are real. On a cabin charter, remember you are sharing a\nsmall space with strangers for a week; the good operators screen for vibe and group\ntype, so ask who else is booked.\n\n## Who This Is (and Isn't) For\nThis vibe is ideal for travelers who want to cover several islands without packing and\nrepacking, who like the idea of swimming off the back of the boat before breakfast,\nand who want a mix of lively towns and empty bays on the same trip. Skippered and\ncrewed options make it work for people who have never sailed, and cabin charters make\nit affordable for solo travelers and couples who do not want to fund a whole yacht.\n\nIt is a weaker fit if you want to stay put and dig into one place, if you need\nreliable wifi and a gym, or if a small cabin and a shared head will wear on you. Big\ngroups who all want privacy will spend a lot, and true non-swimmers will miss most of\nthe point.\n\n## Destination Ranking Snapshot\nScores are 0-100, calibrated within the Mediterranean. See\n[VIBE_RANKING_SYSTEM.md](../VIBE_RANKING_SYSTEM.md) for methodology.\n\n| Rank | Destination | Country | IATA | Score | Tier | Best Window | Why |\n|------|-------------|---------|------|-------|------|-------------|-----|\n| 1 | Dalmatian Coast (Split) | Croatia | SPU | 90 | S | May-Oct | Dense islands, short sheltered hops, huge charter base |\n| 2 | Cyclades (Paros) | Greece | PAS | 89 | A | May-Oct | Iconic island-hop, strong meltemi, best with a skipper |\n| 3 | Turquoise Coast (Fethiye) | Turkey | DLM | 88 | A | Apr-Oct | Crewed gulet Blue Cruise, sheltered bays, great value |\n| 4 | Ionian Islands (Corfu) | Greece | CFU | 85 | A | May-Oct | Gentle wind, green islands, best for beginners |\n| 5 | Sardinia (La Maddalena) | Italy | OLB | 83 | A | May-Oct | Granite islets, clearest water, upscale |\n| 6 | Dubrovnik & South Dalmatia | Croatia | DBV | 82 | A | May-Oct | Walled-town finish, Mljet and Elaphiti hops |\n| 7 | Bodrum & Gökova Gulf | Turkey | BJV | 81 | A | Apr-Oct | Gulet cruising plus nightlife bookends |\n| 8 | Saronic Gulf (Athens) | Greece | ATH | 80 | A | Apr-Oct | Easy short loop, quick airport access |\n| 9 | Corsica (Bonifacio) | France | FSC | 79 | A | May-Oct | Cliff anchorages, wild south coast |\n| 10 | Aeolian Islands | Italy | CTA | 78 | A | May-Oct | Sail between live volcanoes |\n| 11 | Balearics (Palm nland"}]},{"name":"Zakynthos (Blue Caves)","country":"Greece","iata":"ZTH","vibeCount":1,"vibes":[{"key":"sea_caves_blue_lagoons","label":"Sea Caves & Blue Lagoons","emoji":"🔵","score":84,"tier":"A","bestWindow":"Jun-Sep","why":"Glowing grottoes and the Navagio shipwreck cove"}]},{"name":"Zrće Beach (Novalja)","country":"Croatia","iata":"ZAD","vibeCount":1,"vibes":[{"key":"nightlife_clubbing","label":"Nightlife & Clubbing","emoji":"🌙","score":78,"tier":"A","bestWindow":"Jun-Sep","why":"Croatia's open-air club and festival hub"}]}]}];

marked.use({ breaks: false, gfm: true });

let currentSR  = null;   // active sub-region object
let currentVibeKey = null;

/* ── Helpers ──────────────────────────────────────────────────────── */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function tierColor(t) {
  return { S:'#8B6914', A:'#B85C38', B:'#1C3649', C:'#5C5449', D:'#9E9690', E:'#B8B0A6' }[t] || '#9E9690';
}

/* ── Selector ────────────────────────────────────────────────────── */

// Build { region -> [subregion objects] } map
const REGION_MAP = {};
for (const sr of SUBREGIONS) {
  if (!REGION_MAP[sr.region]) REGION_MAP[sr.region] = [];
  REGION_MAP[sr.region].push(sr);
}
const REGIONS = Object.keys(REGION_MAP).sort();

function renderSelector() {
  const rSel = document.getElementById('region-select');
  rSel.innerHTML = REGIONS.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join('');
  populateSubRegions(REGIONS[0]);
}

function populateSubRegions(region) {
  const srSel = document.getElementById('subregion-select');
  const subs  = REGION_MAP[region] || [];
  srSel.innerHTML = subs.map(sr => `<option value="${esc(sr.key)}">${esc(sr.subregion)}</option>`).join('');
}

function onRegionChange() {
  const region = document.getElementById('region-select').value;
  populateSubRegions(region);
  // auto-select first sub-region in new region
  const first = (REGION_MAP[region] || [])[0];
  if (first) selectSubRegion(first.key);
}

function onSubRegionChange() {
  const key = document.getElementById('subregion-select').value;
  selectSubRegion(key);
}

function selectSubRegion(key) {
  currentSR = SUBREGIONS.find(sr => sr.key === key);
  if (!currentSR) return;

  // Sync dropdowns to match
  document.getElementById('region-select').value    = currentSR.region;
  populateSubRegions(currentSR.region);
  document.getElementById('subregion-select').value = key;

  // Update breadcrumb
  document.getElementById('bc-region').textContent    = currentSR.region.toUpperCase();
  document.getElementById('bc-subregion').textContent = currentSR.subregion.toUpperCase();
  document.getElementById('bc-aside').innerHTML =
    `<b>${currentSR.vibes.length} vibes</b> &nbsp;&middot;&nbsp; <b>${currentSR.destinations.length} destinations</b>`;

  showGrid();
}

/* ── Grid ────────────────────────────────────────────────────────── */
function showGrid() {
  if (!currentSR) return;
  const sr = currentSR;

  document.getElementById('grid-title').textContent = sr.subregion + ' Vibes';
  document.getElementById('grid-sub').textContent   = 'Click any vibe to read the full blog post and destination rankings.';

  document.getElementById('vibe-grid').innerHTML = sr.vibes.map(v => `
    <div class="card" onclick="showDetail('${esc(v.key)}')" title="${esc(v.label)}">
      <div class="card-emoji">${v.emoji}</div>
      <div class="card-label">${esc(v.label)}</div>
      <div class="card-dests">${v.topDests.slice(0,2).map(esc).join(', ')}${v.topDests.length > 2 ? ' +' + (v.topDests.length-2) : ''}</div>
      <div class="card-words">${v.wordCount.toLocaleString()} words &middot; ${v.sourcesCount} sources</div>
      <div class="card-win">${esc(v.bestWindow)}</div>
    </div>
  `).join('');

  document.getElementById('dest-title').textContent = sr.subregion + ' Destinations';
  document.getElementById('dest-sub').textContent   =
    'Every destination scored across all ' + sr.vibes.length + ' vibes. Click to see which vibes it connects to.';

  document.getElementById('dest-grid').innerHTML = sr.destinations.map((d, i) => `
    <div class="dest-pill" onclick="openDestModal(${i})" title="${esc(d.name)} — ${d.vibeCount} vibe${d.vibeCount !== 1 ? 's' : ''}">
      <div>
        <div class="dest-pill-name">${esc(d.name)}</div>
        <div class="dest-pill-country">${esc(d.country)}${d.iata ? ' &middot; ' + esc(d.iata) : ''}</div>
      </div>
      <div class="dest-pill-count">${d.vibeCount}</div>
    </div>
  `).join('');

  document.getElementById('grid-foot').innerHTML =
    'WhereTo Vibes Engine &nbsp;&middot;&nbsp; ' + esc(sr.region) + ' &rsaquo; ' + esc(sr.subregion) +
    ' &nbsp;&middot;&nbsp; <b>' + sr.vibes.length + ' vibes</b> &nbsp;&middot;&nbsp; <b>' + sr.destinations.length + ' destinations</b>';

  document.getElementById('grid-view').classList.remove('hidden');
  document.getElementById('detail-view').classList.add('hidden');
  window.scrollTo({ top: 0, behavior: 'instant' });

  const params = new URLSearchParams(location.search);
  params.set('sr', currentSR.key);
  params.delete('vibe');
  history.pushState({ sr: currentSR.key }, '', '?' + params.toString());
}

/* ── Detail ──────────────────────────────────────────────────────── */
function showDetail(key) {
  const v = currentSR && currentSR.vibes.find(x => x.key === key);
  if (!v) return;
  currentVibeKey = key;

  document.getElementById('det-emoji').textContent  = v.emoji;
  document.getElementById('det-region').textContent = v.region.toUpperCase() + ' › ' + v.subregion.toUpperCase();
  document.getElementById('det-label').textContent  = v.label;
  document.getElementById('foot-vibe').textContent  = v.label;

  document.getElementById('det-chips').innerHTML = [
    `<span class="chip win">${esc(v.bestWindow)}</span>`,
    `<span class="chip">${v.wordCount.toLocaleString()} words</span>`,
    `<span class="chip">${v.sourcesCount} sources</span>`,
    `<span class="chip">Researched ${esc(v.lastResearched)}</span>`,
    ...v.topDests.map(d => `<span class="chip">${esc(d)}</span>`),
  ].join('');

  const bodyEl = document.getElementById('blog-body');
  bodyEl.innerHTML = marked.parse(v.body);

  const h2s = bodyEl.querySelectorAll('h2');
  let navHtml = '';
  h2s.forEach((h, i) => { const id = 'sec-' + i; h.id = id; navHtml += `<a class="jump-btn" href="#${id}">${h.textContent}</a>`; });
  document.getElementById('jump-nav').innerHTML = navHtml;

  bodyEl.querySelectorAll('table td').forEach(td => {
    if (/^[SABCDE]$/.test(td.textContent.trim())) {
      const t = td.textContent.trim();
      td.innerHTML = `<span class="tier tier-${t}">${t}</span>`;
    }
  });
  bodyEl.querySelectorAll('table').forEach(tbl => {
    const ths = Array.from(tbl.querySelectorAll('th')).map(th => th.textContent.trim().toLowerCase());
    const si  = ths.indexOf('score');
    if (si < 0) return;
    tbl.querySelectorAll('tbody tr').forEach(row => {
      const cells = row.querySelectorAll('td');
      if (!cells[si]) return;
      const n = parseInt(cells[si].textContent);
      if (isNaN(n)) return;
      const col = tierColor(n >= 90 ? 'S' : n >= 78 ? 'A' : n >= 65 ? 'B' : n >= 50 ? 'C' : 'D');
      cells[si].innerHTML = `<span style="font-family:var(--serif);font-size:16px;font-weight:600;color:${col}">${n}</span>`;
    });
  });
  bodyEl.querySelectorAll('p').forEach(p => {
    if (/^Confidence:/i.test(p.textContent.trim()))
      p.style.cssText = 'font-size:12px;color:var(--wg500);font-style:italic;margin-top:-8px';
  });

  document.getElementById('grid-view').classList.add('hidden');
  document.getElementById('detail-view').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'instant' });

  const params = new URLSearchParams(location.search);
  params.set('vibe', key);
  history.pushState({ sr: currentSR.key, key }, '', '?' + params.toString());
}

/* ── Destination modal ───────────────────────────────────────────── */
function openDestModal(idx) {
  const d = currentSR.destinations[idx];
  document.getElementById('modal-name').textContent        = d.name;
  document.getElementById('modal-country').textContent     = d.country;
  document.getElementById('modal-iata').textContent        = d.iata || '';
  document.getElementById('modal-vibe-count').textContent  = d.vibeCount + ' vibe' + (d.vibeCount !== 1 ? 's' : '') + ' connected';
  document.getElementById('modal-vibes').innerHTML = d.vibes.map(v => {
    const col = tierColor(v.tier);
    return `<div class="modal-vibe-row">
      <div class="modal-vibe-emoji">${v.emoji}</div>
      <div class="modal-vibe-info">
        <div class="modal-vibe-label">${esc(v.label)}</div>
        ${v.why ? `<div class="modal-vibe-why">${esc(v.why)}</div>` : ''}
        ${v.bestWindow ? `<div class="modal-vibe-win">${esc(v.bestWindow)}</div>` : ''}
      </div>
      <div class="modal-score-wrap">
        <span class="modal-score" style="color:${col}">${v.score}</span>
        <span class="tier tier-${esc(v.tier)}">${esc(v.tier)}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── Browser nav ─────────────────────────────────────────────────── */
window.addEventListener('popstate', e => {
  const st = e.state || {};
  if (st.sr) {
    const sr = SUBREGIONS.find(x => x.key === st.sr);
    if (sr) {
      currentSR = sr;
      document.getElementById('region-select').value = currentSR.region;
      populateSubRegions(currentSR.region);
      document.getElementById('subregion-select').value = st.sr;
      document.getElementById('bc-region').textContent    = currentSR.region.toUpperCase();
      document.getElementById('bc-subregion').textContent = currentSR.subregion.toUpperCase();
      document.getElementById('bc-aside').innerHTML = '<b>' + currentSR.vibes.length + ' vibes</b> &nbsp;&middot;&nbsp; <b>' + currentSR.destinations.length + ' destinations</b>';
    }
  }
  if (st.key) showDetail(st.key);
  else showGrid();
});

/* ── Init ────────────────────────────────────────────────────────── */
renderSelector();
const params = new URLSearchParams(location.search);
const initSR   = params.get('sr')   || (SUBREGIONS[0] && SUBREGIONS[0].key);
const initVibe = params.get('vibe');
selectSubRegion(initSR);
if (initVibe) showDetail(initVibe);
</script>
</body>
