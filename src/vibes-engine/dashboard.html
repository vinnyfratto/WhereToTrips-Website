<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vibes Engine — Search Dashboard · WhereTo Internal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --cream:#F0EBE0; --card:#FDFAF6;
  --navy:#1C3649; --navy-lt:#2A4D65;
  --rust:#B85C38;
  --green:#2A7A4B; --green-lt:#E8F5EE;
  --amber:#8A6A10; --amber-lt:#FBF4E0;
  --wg100:#F5F0E8; --wg200:#E4DDD3; --wg300:#D4CCC2;
  --wg400:#B8B0A6; --wg500:#9E9690; --wg600:#5C5449;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'Nunito Sans',system-ui,sans-serif;
  --r-lg:20px; --r-md:12px; --r-sm:8px;
  --sh-sm:0 2px 10px rgba(28,54,73,.07);
  --sh-md:0 8px 28px rgba(28,54,73,.11);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--navy);font-family:var(--sans);font-size:15px;line-height:1.6;min-height:100vh}

/* Header */
.hdr{position:sticky;top:0;z-index:100;background:var(--navy);height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,.22)}
.hdr-brand{display:flex;align-items:baseline;gap:10px}
.hdr-logo{font-family:var(--serif);font-size:22px;color:var(--cream);letter-spacing:-.3px}
.hdr-sub{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--rust)}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-badge{font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--rust);border:1.5px solid var(--rust);padding:3px 9px;border-radius:4px}
.hdr-link{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45);text-decoration:none;padding:6px 10px;border-radius:var(--r-sm);transition:color .14s,background .14s}
.hdr-link:hover{color:var(--cream);background:rgba(255,255,255,.08)}

/* State bar */
.state-bar{background:var(--navy-lt);border-bottom:1px solid rgba(255,255,255,.07);padding:0 24px;height:42px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.4);overflow-x:auto;white-space:nowrap}
.state-bar .crumb{color:var(--cream)}
.state-bar .sep{color:rgba(255,255,255,.25);font-weight:300;letter-spacing:0}
.state-bar .vbadge{background:var(--rust);color:#fff;padding:2px 10px;border-radius:10px;letter-spacing:0;text-transform:none;font-size:11px;font-weight:600}
.state-bar .edit-link{margin-left:auto;color:rgba(255,255,255,.35);cursor:pointer;text-transform:none;letter-spacing:0;font-size:11px;font-weight:400;text-decoration:underline;text-underline-offset:2px;flex-shrink:0;background:none;border:none;font-family:var(--sans)}
.state-bar .edit-link:hover{color:var(--cream)}

/* Layout */
main{max-width:1100px;margin:0 auto;padding:36px 24px 80px}
.section{margin-bottom:36px}
.section-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--wg500);margin-bottom:12px}
.section-title{font-family:var(--serif);font-size:26px;line-height:1.25;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--wg600);font-weight:300;margin-bottom:20px}
.divider{border:none;border-top:1px solid var(--wg200);margin:36px 0}

/* Trip Setup */
.setup-row{display:grid;grid-template-columns:140px 110px 1fr 1fr;gap:12px;align-items:end}
@media(max-width:640px){.setup-row{grid-template-columns:1fr 1fr}}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:10px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:var(--wg600)}
.field input{font-family:var(--sans);font-size:15px;color:var(--navy);background:var(--card);border:1.5px solid var(--wg300);border-radius:var(--r-sm);padding:10px 14px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.field input:focus{border-color:var(--rust);box-shadow:0 0 0 3px rgba(184,92,56,.12)}
.field input::placeholder{color:var(--wg400)}

/* Region cards */
.region-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:640px){.region-grid{grid-template-columns:repeat(2,1fr)}}
.region-card{background:var(--card);border:1.5px solid var(--wg200);border-radius:var(--r-md);padding:20px 18px;cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .15s;position:relative}
.region-card:hover{border-color:var(--wg400);box-shadow:var(--sh-md);transform:translateY(-2px)}
.region-card.active{border-color:var(--rust);background:rgba(184,92,56,.04);box-shadow:0 0 0 3px rgba(184,92,56,.13),var(--sh-sm)}
.region-card-emoji{font-size:36px;line-height:1;margin-bottom:10px}
.region-card-name{font-family:var(--serif);font-size:18px;line-height:1.25;margin-bottom:5px}
.region-card-meta{font-size:11px;color:var(--wg500);font-weight:300}
.region-card .check{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;background:var(--rust);color:#fff;display:none;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.region-card.active .check{display:flex}

/* Sub-region chips */
.sr-grid{display:flex;flex-wrap:wrap;gap:8px}
.sr-chip{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--navy);background:var(--card);border:1.5px solid var(--wg200);border-radius:30px;padding:8px 18px;cursor:pointer;transition:border-color .15s,box-shadow .14s,transform .12s;line-height:1}
.sr-chip:hover{border-color:var(--wg400);box-shadow:var(--sh-sm);transform:translateY(-1px)}
.sr-chip.active{border-color:var(--rust);background:rgba(184,92,56,.06);color:var(--rust);font-weight:600;box-shadow:0 0 0 2px rgba(184,92,56,.15)}
.sr-count{font-size:10px;color:var(--wg400);font-weight:300;margin-left:5px}
.sr-chip.active .sr-count{color:rgba(184,92,56,.55)}

/* Vibe chips */
.vibe-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.vibe-actions{display:flex;align-items:center;gap:10px}
.vibe-badge{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--rust);background:rgba(184,92,56,.1);border:1px solid rgba(184,92,56,.25);border-radius:20px;padding:3px 12px}
.clear-btn{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--wg500);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0}
.clear-btn:hover{color:var(--rust)}
.vibe-grid{display:flex;flex-wrap:wrap;gap:8px}
.vibe-chip{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--navy-lt);background:var(--card);border:1.5px solid var(--wg200);border-radius:20px;padding:7px 15px;cursor:pointer;transition:border-color .15s,background .15s,color .15s,box-shadow .14s;user-select:none;line-height:1}
.vibe-chip:hover{border-color:var(--wg400)}
.vibe-chip.sel{background:var(--rust);border-color:var(--rust);color:#fff;box-shadow:0 2px 8px rgba(184,92,56,.28)}
.vibe-chip .htag{font-size:9px;opacity:.7;margin-left:4px}

/* Action bar */
.action-bar{background:var(--card);border:1.5px solid var(--wg200);border-radius:var(--r-md);padding:20px 22px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
.action-summary{font-size:13px;color:var(--wg600);line-height:1.7;flex:1;min-width:200px}
.action-summary strong{color:var(--navy)}
.action-summary .vhighlight{color:var(--rust);font-weight:600}
.search-btn{font-family:var(--sans);font-size:13px;font-weight:600;background:var(--rust);color:#fff;border:none;border-radius:var(--r-sm);padding:13px 26px;cursor:pointer;transition:background .15s,transform .12s,box-shadow .15s;white-space:nowrap;flex-shrink:0;letter-spacing:.3px}
.search-btn:hover:not(:disabled){background:#A3512F;transform:translateY(-1px);box-shadow:0 4px 16px rgba(184,92,56,.38)}
.search-btn:disabled{background:var(--wg400);cursor:default}

/* Results */
.results-box{margin-top:20px}
.results-loading{background:var(--card);border:1.5px solid var(--wg200);border-radius:var(--r-md);padding:32px 24px;text-align:center}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--wg200);border-top-color:var(--rust);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.results-loading-title{font-family:var(--serif);font-size:19px;color:var(--navy);margin-bottom:6px}
.results-loading-sub{font-size:13px;color:var(--wg500)}

/* Results table */
.results-wrap{overflow-x:auto;border-radius:var(--r-md);box-shadow:var(--sh-sm)}
.results-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card)}
.results-table thead th{background:var(--navy);color:var(--cream);font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;padding:11px 14px;text-align:left;white-space:nowrap}
.results-table thead th:first-child{border-radius:var(--r-md) 0 0 0}
.results-table thead th:last-child{border-radius:0 var(--r-md) 0 0}
.results-table tbody tr{border-bottom:1px solid var(--wg200);transition:background .12s}
.results-table tbody tr:last-child{border-bottom:none}
.results-table tbody tr:hover td{background:var(--wg100)}
.results-table td{padding:11px 14px;vertical-align:middle;white-space:nowrap}
.results-table td.wrap{white-space:normal;min-width:160px}

/* Cell types */
.dest-name{font-family:var(--serif);font-size:14px;color:var(--navy)}
.dest-country{font-size:11px;color:var(--wg500);font-weight:300}
.iata-code{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--navy-lt);font-family:monospace}
.score-val{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--navy)}
.tier-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.5px}
.tier-S{background:rgba(201,168,76,.14);color:#7A5C0F;border:1px solid rgba(201,168,76,.4)}
.tier-A{background:rgba(184,92,56,.12);color:var(--rust);border:1px solid rgba(184,92,56,.3)}
.tier-B{background:rgba(28,54,73,.08);color:var(--navy);border:1px solid rgba(28,54,73,.2)}
.tier-C{background:rgba(92,84,73,.08);color:var(--wg600);border:1px solid rgba(92,84,73,.2)}
.tier-D{background:rgba(158,150,144,.1);color:var(--wg500);border:1px solid var(--wg300)}
.tier-E{background:var(--wg100);color:var(--wg400);border:1px solid var(--wg200)}
.vibes-cell{font-size:11px;color:var(--wg600);line-height:1.5}
.vibes-cell .vm{display:inline-block;background:rgba(184,92,56,.07);border:1px solid rgba(184,92,56,.18);border-radius:10px;padding:1px 7px;margin:1px 2px;white-space:nowrap}
.price-val{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--navy)}
.price-val.over{color:var(--wg500)}
.in-budget-yes{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--green);background:var(--green-lt);border:1px solid rgba(42,122,75,.2);border-radius:10px;padding:2px 9px}
.in-budget-no{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--wg500);background:var(--wg100);border:1px solid var(--wg300);border-radius:10px;padding:2px 9px}
.no-flights{font-size:12px;color:var(--wg400);font-style:italic}
.airline-name{font-size:13px;color:var(--navy);font-weight:500}
.route-val{font-size:12px;color:var(--wg600);letter-spacing:.3px}
.dur-val{font-size:13px;color:var(--navy-lt)}
.stops-val{font-size:12px}
.stops-0{color:var(--green);font-weight:600}
.stops-1{color:var(--amber);font-weight:600}
.stops-2{color:var(--rust);font-weight:600}
.co2-val{font-size:12px;color:var(--wg500)}
.book-link{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--rust);text-decoration:none;border:1.5px solid rgba(184,92,56,.4);border-radius:var(--r-sm);padding:5px 12px;transition:background .14s,border-color .14s}
.book-link:hover{background:rgba(184,92,56,.07);border-color:var(--rust)}
.err-cell{font-size:12px;color:var(--wg400);font-style:italic}

/* Error / no-data states */
.results-notice{background:var(--card);border:1.5px solid var(--wg200);border-radius:var(--r-md);padding:20px 22px;font-size:13px;color:var(--wg600)}
.results-meta{font-size:11px;color:var(--wg500);margin-bottom:14px;padding:10px 14px;background:var(--wg100);border-radius:var(--r-sm)}

.hidden{display:none!important}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <span class="hdr-logo">WhereTo</span>
    <span class="hdr-sub">Vibes Engine</span>
  </div>
  <div class="hdr-right">
    <a href="/vibes-engine/" class="hdr-link">← Review Page</a>
    <span class="hdr-badge">Internal Dashboard</span>
  </div>
</header>

<div class="state-bar" id="state-bar">
  <span style="opacity:.35">Select a region to begin</span>
</div>

<main>

  <!-- Trip Setup -->
  <section class="section">
    <div class="section-label">Trip Setup</div>
    <div class="setup-row">
      <div class="field">
        <label for="f-budget">Budget (RT)</label>
        <input type="text" id="f-budget" value="$2000" />
      </div>
      <div class="field">
        <label for="f-airport">Origin Airport</label>
        <input type="text" id="f-airport" placeholder="e.g. JFK" maxlength="4" />
      </div>
      <div class="field">
        <label for="f-depart">Depart</label>
        <input type="date" id="f-depart" />
      </div>
      <div class="field">
        <label for="f-return">Return</label>
        <input type="date" id="f-return" />
      </div>
    </div>
  </section>

  <hr class="divider" style="margin-top:0" />

  <!-- Region -->
  <section class="section">
    <div class="section-label">Step 1 — Region</div>
    <div class="section-title">Where in the world?</div>
    <div class="section-sub">Select a region — sub-regions and vibes load from the Vibes Engine.</div>
    <div class="region-grid" id="region-grid"></div>
  </section>

  <!-- Sub-region -->
  <section class="section hidden" id="sr-section">
    <hr class="divider" style="margin-top:0" />
    <div class="section-label">Step 2 — Sub-Region</div>
    <div class="section-title" id="sr-title"></div>
    <div class="section-sub" id="sr-sub"></div>
    <div class="sr-grid" id="sr-grid"></div>
  </section>

  <!-- Vibes -->
  <section class="section hidden" id="vibe-section">
    <hr class="divider" style="margin-top:0" />
    <div class="vibe-header">
      <div>
        <div class="section-label">Step 3 — Vibes</div>
        <div class="section-title" id="vibe-title"></div>
        <div class="section-sub">Multi-select — pick everything that fits the trip.</div>
      </div>
      <div class="vibe-actions">
        <span class="vibe-badge hidden" id="vibe-count"></span>
        <button class="clear-btn hidden" id="clear-btn" onclick="clearVibes()">Clear all</button>
      </div>
    </div>
    <div class="vibe-grid" id="vibe-grid"></div>
  </section>

  <!-- Action + Results -->
  <section class="hidden" id="action-section">
    <hr class="divider" style="margin-top:0" />
    <div class="action-bar">
      <div class="action-summary" id="action-summary"></div>
      <button class="search-btn" id="search-btn" onclick="runSearch()">Search Destinations →</button>
    </div>
    <div class="results-box" id="results-box"></div>
  </section>

</main>

function pickRegion(key) {
  s.region=key; s.subregion=null; s.vibes=new Set();
  document.querySelectorAll('.region-card').forEach(c => c.classList.toggle('active', c.dataset.r===key));
  const R = DATA[key];
  const srg = document.getElementById('sr-grid');
  srg.innerHTML='';
  document.getElementById('sr-title').textContent = R.label;
  document.getElementById('sr-sub').textContent = Object.keys(R.subregions).length+' sub-regions — click one to load its vibes.';
  for (const [srKey,SR] of Object.entries(R.subregions)) {
    const el = document.createElement('button');
    el.className='sr-chip'; el.dataset.sr=srKey;
    el.innerHTML = SR.label+`<span class="sr-count">${SR.vibes.length}</span>`;
    el.addEventListener('click', () => pickSr(srKey));
    srg.appendChild(el);
  }
  show('sr-section'); hide('vibe-section'); hide('action-section');
  updateBar();
}

function pickSr(key) {
  s.subregion=key; s.vibes=new Set();
  document.querySelectorAll('.sr-chip').forEach(c => c.classList.toggle('active', c.dataset.sr===key));
  const SR = DATA[s.region].subregions[key];
  document.getElementById('vibe-title').textContent = SR.label+' — Vibes';
  const vg = document.getElementById('vibe-grid');
  vg.innerHTML='';
  for (const v of SR.vibes) {
    const el = document.createElement('button');
    el.className='vibe-chip'; el.dataset.vk=v.key;
    const htag = v.hotel_tag && HOTEL_LABEL[v.hotel_tag] ? `<span class="htag">${HOTEL_LABEL[v.hotel_tag]}</span>` : '';
    el.innerHTML = v.label+htag;
    el.addEventListener('click', () => toggleVibe(v.key, el));
    vg.appendChild(el);
  }
  show('vibe-section'); hide('action-section');
  refreshVibeCounts(); updateBar();
}

function toggleVibe(key, el) {
  if (s.vibes.has(key)){s.vibes.delete(key);el.classList.remove('sel');}
  else{s.vibes.add(key);el.classList.add('sel');}
  refreshVibeCounts(); updateBar(); refreshAction();
}

function clearVibes() {
  s.vibes=new Set();
  document.querySelectorAll('.vibe-chip').forEach(c=>c.classList.remove('sel'));
  refreshVibeCounts(); updateBar(); refreshAction();
}

function refreshVibeCounts() {
  const n=s.vibes.size;
  const badge=document.getElementById('vibe-count');
  const btn=document.getElementById('clear-btn');
  badge.textContent=n+' selected';
  badge.classList.toggle('hidden',n===0);
  btn.classList.toggle('hidden',n===0);
}

function refreshAction() {
  if (!s.vibes.size){hide('action-section');return;}
  show('action-section');
  const R=DATA[s.region], SR=R.subregions[s.subregion];
  const budget  = document.getElementById('f-budget').value||'$2000';
  const airport = (document.getElementById('f-airport').value||'').toUpperCase()||'—';
  const depart  = document.getElementById('f-depart').value;
  const ret     = document.getElementById('f-return').value;
  const dates   = depart&&ret?depart+' → '+ret:depart||ret||'no dates set';
  const vLabels = [...s.vibes].map(k=>SR.vibes.find(v=>v.key===k)?.label||k).join(', ');
  document.getElementById('action-summary').innerHTML =
    `<strong>${R.label} · ${SR.label}</strong><br>`+
    `Budget <strong>${budget}</strong> &nbsp;·&nbsp; From <strong>${airport}</strong> &nbsp;·&nbsp; ${dates}<br>`+
    `<span class="vhighlight">${s.vibes.size} vibe${s.vibes.size!==1?'s':''} selected:</span> ${vLabels}`;
}

function updateBar() {
  const bar=document.getElementById('state-bar');
  if (!s.region){bar.innerHTML='<span style="opacity:.35">Select a region to begin</span>';return;}
  const R=DATA[s.region];
  let html=`<span class="crumb">${R.label}</span>`;
  if (s.subregion) {
    const SR=R.subregions[s.subregion];
    html+=` <span class="sep">›</span> <span class="crumb">${SR.label}</span>`;
    if (s.vibes.size>0)
      html+=` <span class="sep">›</span> <span class="vbadge">${s.vibes.size} vibe${s.vibes.size!==1?'s':''}</span>`;
    html+=` <button class="edit-link" onclick="pickRegion(s.region)">Change region</button>`;
  }
  bar.innerHTML=html;
}

// ── Search ───────────────────────────────────────────────────────

function parseBudget(v) {
  return parseFloat((v||'2000').replace(/[^0-9.]/g,''))||2000;
}

function fmtDur(mins) {
  if (!mins) return '—';
  const h=Math.floor(mins/60), m=mins%60;
  return h>0?(m>0?`${h}h ${m}m`:`${h}h`):`${m}m`;
}

async function runSearch() {
  const origCode = (document.getElementById('f-airport').value||'').toUpperCase().replace(/[^A-Z]/g,'');
  const depart   = document.getElementById('f-depart').value;
  const ret      = document.getElementById('f-return').value;
  const budget   = parseBudget(document.getElementById('f-budget').value);

  if (!origCode||origCode.length!==3) { alert('Enter a valid 3-letter origin airport code (e.g. JFK).'); return; }
  if (!depart||!ret) { alert('Set departure and return dates.'); return; }
  if (!s.vibes.size) { alert('Select at least one vibe.'); return; }

  const SR = DATA[s.region].subregions[s.subregion];
  const srRankings = RANKINGS[s.region]?.[s.subregion] || {};

  // Collect all IATAs from selected vibes, track best score + matched vibes per IATA
  const iataMap = {};
  for (const vibeKey of s.vibes) {
    const rows = srRankings[vibeKey] || [];
    const vibeLabel = SR.vibes.find(v=>v.key===vibeKey)?.label || vibeKey;
    for (const row of rows) {
      if (row.iata === origCode) continue; // skip if same as origin
      if (!iataMap[row.iata]) {
        iataMap[row.iata] = { dest:row.dest, country:row.country, bestScore:row.score, tier:row.tier, vibes:[] };
      } else if (row.score > iataMap[row.iata].bestScore) {
        iataMap[row.iata].bestScore = row.score;
        iataMap[row.iata].tier = row.tier;
      }
      if (!iataMap[row.iata].vibes.some(v=>v.key===vibeKey))
        iataMap[row.iata].vibes.push({ key:vibeKey, label:vibeLabel, score:row.score });
    }
  }

  // Sort by best score desc, take top 8
  const targets = Object.entries(iataMap)
    .sort((a,b)=>b[1].bestScore-a[1].bestScore)
    .slice(0,8);

  if (!targets.length) {
    document.getElementById('results-box').innerHTML =
      `<div class="results-notice">No ranked destinations found in the Vibes Engine for the selected vibes in ${SR.label}. Ranking data may not be loaded yet for this sub-region.</div>`;
    return;
  }

  // Show loading
  const btn = document.getElementById('search-btn');
  btn.disabled = true; btn.textContent = 'Searching…';
  document.getElementById('results-box').innerHTML = `
    <div class="results-loading">
      <div class="spinner"></div>
      <div class="results-loading-title">Searching ${targets.length} destinations via Duffel…</div>
      <div class="results-loading-sub">This may take up to 20 seconds</div>
    </div>`;

  // Fan out Duffel calls
  const calls = targets.map(([iata, info]) =>
    fetchFlight(origCode, iata, depart, ret)
      .then(data => ({ iata, info, data }))
      .catch(err => ({ iata, info, error: err.message }))
  );
  const results = await Promise.allSettled(calls);

  btn.disabled=false; btn.textContent='Search Destinations →';

  // Render
  renderResults(results.map(r=>r.value||r.reason), budget, origCode, depart, ret, SR.label);
}

async function fetchFlight(origCode, destCode, departDate, returnDate) {
  const resp = await fetch(`${SUPABASE_URL}/functions/v1/duffel-search`, {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'apikey':SUPABASE_ANON_KEY,
      'Authorization':`Bearer ${SUPABASE_ANON_KEY}`
    },
    body:JSON.stringify({ origCode, destCode, departDate, returnDate, adults:1, maxResults:3 })
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(()=>'');
    throw new Error(`${resp.status}: ${txt.slice(0,120)}`);
  }
  return resp.json();
}

function renderResults(rows, budget, origCode, depart, ret, srLabel) {
  // Sort: flights found first (by price asc), then no-flights, then errors
  rows.sort((a,b) => {
    const aP = a.data?.data?.itineraries?.[0]?.price?.raw ?? Infinity;
    const bP = b.data?.data?.itineraries?.[0]?.price?.raw ?? Infinity;
    return aP - bP;
  });

  const withFlights  = rows.filter(r=>r.data?.data?.itineraries?.length);
  const noFlights    = rows.filter(r=>!r.error && !r.data?.data?.itineraries?.length);
  const errored      = rows.filter(r=>r.error);
  const inBudgetN    = withFlights.filter(r=>r.data.data.itineraries[0].price.raw<=budget).length;

  const meta = `Searching from <strong>${origCode}</strong> · ${depart} → ${ret} · Budget <strong>$${budget.toLocaleString()}</strong> · ${withFlights.length} of ${rows.length} destinations returned flights · <strong>${inBudgetN}</strong> within budget`;

  const thead = `<thead><tr>
    <th>Destination</th>
    <th>IATA</th>
    <th>Score</th>
    <th>Tier</th>
    <th>Matched Vibes</th>
    <th>Cheapest RT</th>
    <th>Budget</th>
    <th>Airline</th>
    <th>Route Out</th>
    <th>Stops Out</th>
    <th>Duration Out</th>
    <th>Duration Back</th>
    <th>CO₂ kg</th>
    <th>Book</th>
  </tr></thead>`;

  const tbRows = rows.map(row => {
    const { iata, info } = row;
    const itin = row.data?.data?.itineraries?.[0];
    const tierCls = 'tier-'+(info.tier||'B');
    const vibesHtml = (info.vibes||[]).map(v=>`<span class="vm">${v.label} ${v.score}</span>`).join('');
    const destCell = `<td><div class="dest-name">${info.dest}</div><div class="dest-country">${info.country}</div></td>`;
    const iataCell = `<td><span class="iata-code">${iata}</span></td>`;
    const scoreCell = `<td><span class="score-val">${info.bestScore}</span></td>`;
    const tierCell = `<td><span class="tier-badge ${tierCls}">${info.tier||'—'}</span></td>`;
    const vibesCell = `<td class="vibes-cell wrap">${vibesHtml||'—'}</td>`;

    if (row.error) return `<tr>${destCell}${iataCell}${scoreCell}${tierCell}${vibesCell}
      <td colspan="9"><span class="err-cell">Error: ${row.error}</span></td></tr>`;

    if (!itin) return `<tr>${destCell}${iataCell}${scoreCell}${tierCell}${vibesCell}
      <td colspan="9"><span class="no-flights">No flights found</span></td></tr>`;

    const price = itin.price.raw;
    const inBudget = price <= budget;
    const leg0 = itin.legs?.[0]||{};
    const leg1 = itin.legs?.[1]||{};
    const route = (itin.route||[]).join(' › ');
    const stops0 = leg0.stopCount??'—';
    const stopsCls = stops0===0?'stops-0':stops0===1?'stops-1':'stops-2';
    const co2 = itin.co2Kg ? Math.round(itin.co2Kg) : '—';

    return `<tr>
      ${destCell}
      ${iataCell}
      ${scoreCell}
      ${tierCell}
      ${vibesCell}
      <td><span class="price-val${inBudget?'':' over'}">${itin.price.formatted}</span></td>
      <td>${inBudget?'<span class="in-budget-yes">✓ Yes</span>':'<span class="in-budget-no">Over</span>'}</td>
      <td><span class="airline-name">${leg0.carriers?.marketing?.[0]?.name||'—'}</span></td>
      <td><span class="route-val">${route||'—'}</span></td>
      <td><span class="stops-val ${stopsCls}">${stops0===0?'Nonstop':stops0+' stop'+(stops0!==1?'s':'')}</span></td>
      <td><span class="dur-val">${fmtDur(leg0.durationInMinutes)}</span></td>
      <td><span class="dur-val">${fmtDur(leg1.durationInMinutes)}</span></td>
      <td><span class="co2-val">${co2}</span></td>
      <td><a class="book-link" href="${itin.deeplink}" target="_blank" rel="noopener">Book →</a></td>
    </tr>`;
  }).join('');

  document.getElementById('results-box').innerHTML = `
    <div class="results-meta">${meta}</div>
    <div class="results-wrap">
      <table class="results-table">${thead}<tbody>${tbRows}</tbody></table>
    </div>`;
}

function show(id){document.getElementById(id).classList.remove('hidden')}
function hide(id){document.getElementById(id).classList.add('hidden')}

document.getElementById('f-airport').addEventListener('input',function(){
  this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'');
  refreshAction();
});
['f-budget','f-depart','f-return'].forEach(id=>
  document.getElementById(id).addEventListener('input',refreshAction)
);
</script>
</body>
</html>
