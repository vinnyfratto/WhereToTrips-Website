# ============================================================
# Sveltia CMS configuration (Decap-compatible)
# Editor lives at  https://wheretotrips.com/admin
#
# Auth options:
#  - Single editor (simplest): at /admin choose "Sign In with Token" and
#    paste a GitHub PAT with read/write on this repo. No base_url needed.
#  - Multiple editors (OAuth login): deploy sveltia-cms-auth (Cloudflare
#    Worker) and uncomment base_url below. See the build tracker §10 Q4.
#
# The section "types" palette (anchored as &section_types) must match the
# partial filenames in src/_includes/sections/. The type key is `type`.
# ============================================================

backend:
  name: github
  repo: vinnyfratto/WhereToTrips-Website
  branch: main
  # base_url: https://YOUR-WORKER.workers.dev   # only for OAuth login

media_folder: src/media
public_folder: /media

collections:
  # ── Marketing pages (block-composed) ───────────────────────
  - name: pages
    label: Pages
    icon: description
    files:
      - name: home
        label: "Home"
        file: src/index.md
        fields: &page_fields
          - { label: "SEO title", name: title, widget: string }
          - { label: "SEO description", name: description, widget: text }
          - { label: Layout, name: layout, widget: hidden, default: layouts/page.njk }
          - label: Page sections
            label_singular: Section
            name: sections
            widget: list
            types: &section_types
              - name: hero
                label: Hero
                fields:
                  - { name: eyebrow, widget: string, required: false }
                  - label: Title
                    name: title
                    widget: object
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - { name: lede, widget: text, required: false }
                  - label: Primary button
                    name: primaryBtn
                    widget: object
                    required: false
                    fields:
                      - { name: label, widget: string }
                      - { name: href, widget: string }
                  - label: Secondary button
                    name: ghostBtn
                    widget: object
                    required: false
                    fields:
                      - { name: label, widget: string }
                      - { name: href, widget: string }
                  - label: Image
                    name: image
                    widget: object
                    fields:
                      - { name: src, widget: image }
                      - { name: alt, widget: string }
                  - label: Floating badge
                    name: badge
                    widget: object
                    required: false
                    fields:
                      - { name: title, widget: string }
                      - { name: subtitle, widget: string }

              - name: feature_split
                label: Feature split
                fields:
                  - { name: id, widget: string, required: false }
                  - { label: "Flip image to right", name: flip, widget: boolean, default: false, required: false }
                  - { label: "Tinted background", name: background, widget: boolean, default: false, required: false }
                  - { name: eyebrow, widget: string, required: false }
                  - label: Title
                    name: title
                    widget: object
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - { name: lede, widget: text, required: false }
                  - { name: body, widget: text, required: false }
                  - label: Image
                    name: image
                    widget: object
                    fields:
                      - { name: src, widget: image }
                      - { name: alt, widget: string }
                  - label: Stat badges
                    name: stats
                    widget: list
                    required: false
                    fields:
                      - { name: value, widget: string }
                      - { name: label, widget: string }
                  - label: Feature checklist
                    name: features
                    widget: list
                    required: false
                    fields:
                      - { name: icon, widget: string }
                      - { name: label, widget: string }
                  - label: Inline button
                    name: cta
                    widget: object
                    required: false
                    fields:
                      - { name: label, widget: string }
                      - { name: href, widget: string }

              - name: chat
                label: Conversational search
                fields:
                  - { name: id, widget: string, required: false }
                  - { name: eyebrow, widget: string, required: false }
                  - label: Title
                    name: title
                    widget: object
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - { name: lede, widget: text, required: false }
                  - { label: Example messages, name: examples, widget: list, field: { name: example, widget: string } }
                  - label: Image
                    name: image
                    widget: object
                    fields:
                      - { name: src, widget: image }
                      - { name: alt, widget: string }

              - name: steps
                label: Steps
                fields:
                  - { name: id, widget: string, required: false }
                  - { name: eyebrow, widget: string, required: false }
                  - label: Title
                    name: title
                    widget: object
                    required: false
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - { name: lede, widget: text, required: false }
                  - label: Steps
                    name: steps
                    widget: list
                    fields:
                      - { name: title, widget: string }
                      - { name: body, widget: text }

              - name: tile_grid
                label: Tile grid
                fields:
                  - { name: id, widget: string, required: false }
                  - { label: "Tinted background", name: background, widget: boolean, default: false, required: false }
                  - { label: "Center heading", name: center, widget: boolean, default: false, required: false }
                  - { name: eyebrow, widget: string, required: false }
                  - label: Title
                    name: title
                    widget: object
                    required: false
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - { name: intro, widget: text, required: false }
                  - { name: columns, widget: number, default: 3, required: false }
                  - label: Tiles
                    name: tiles
                    widget: list
                    fields:
                      - { name: label, widget: string }
                      - { name: blurb, widget: text, required: false }
                      - { label: "Icon (emoji)", name: icon, widget: string, required: false }
                      - { name: image, widget: image, required: false }
                      - { name: href, widget: string, required: false }

              - name: collection_grid
                label: Collection grid (auto-lists vibes/destinations/insights)
                fields:
                  - { name: id, widget: string, required: false }
                  - { label: "Tinted background", name: background, widget: boolean, default: false, required: false }
                  - { name: eyebrow, widget: string, required: false }
                  - label: Title
                    name: title
                    widget: object
                    required: false
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - { name: intro, widget: text, required: false }
                  - label: Which collection
                    name: collection
                    widget: select
                    options: [vibe, destination, insight]
                  - { name: columns, widget: number, default: 3, required: false }

              - name: faq_accordion
                label: FAQ accordion
                fields:
                  - { name: id, widget: string, required: false }
                  - { name: eyebrow, widget: string, required: false }
                  - label: Title
                    name: title
                    widget: object
                    required: false
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - label: Questions
                    name: items
                    widget: list
                    fields:
                      - { label: Question, name: q, widget: string }
                      - { label: Answer, name: a, widget: markdown }

              - name: email_capture
                label: Email capture
                fields:
                  - { name: id, widget: string, required: false }
                  - { label: "Tinted background", name: background, widget: boolean, default: false, required: false }
                  - { name: eyebrow, widget: string, required: false }
                  - label: Title
                    name: title
                    widget: object
                    required: false
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - { name: body, widget: text, required: false }
                  - { name: subject, widget: string, required: false }
                  - { label: "Intent tag (e.g. app_link)", name: intent, widget: string, required: false }
                  - { name: buttonLabel, widget: string, required: false }
                  - { name: note, widget: string, required: false }

              - name: contact_form
                label: Contact form
                fields:
                  - { name: id, widget: string, required: false }
                  - { label: "Tinted background", name: background, widget: boolean, default: false, required: false }
                  - { name: eyebrow, widget: string, required: false }
                  - label: Title
                    name: title
                    widget: object
                    required: false
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - { name: body, widget: text, required: false }
                  - { label: "Show company field", name: company, widget: boolean, default: false, required: false }
                  - { label: "Intent tag", name: intent, widget: string, required: false }
                  - { name: subject, widget: string, required: false }
                  - { name: placeholder, widget: string, required: false }
                  - { name: buttonLabel, widget: string, required: false }

              - name: rich_text
                label: Rich text
                fields:
                  - { name: id, widget: string, required: false }
                  - { label: "Tinted background", name: background, widget: boolean, default: false, required: false }
                  - label: Title
                    name: title
                    widget: object
                    required: false
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - { name: body, widget: markdown }

              - name: cta_band
                label: Download / CTA band
                fields:
                  - { name: id, widget: string, required: false }
                  - { name: eyebrow, widget: string, required: false }
                  - label: Title
                    name: title
                    widget: object
                    fields:
                      - { name: pre, widget: string }
                      - { name: accent, widget: string }
                      - { name: post, widget: string, required: false }
                  - { name: body, widget: text, required: false }
                  - { name: formLabel, widget: string, required: false }

      - { name: how_it_works, label: "How It Works", file: src/how-it-works.md, fields: *page_fields }
      - { name: wander_together, label: "Wander Together", file: src/wander-together.md, fields: *page_fields }
      - { name: get_the_app, label: "Get the App", file: src/app.md, fields: *page_fields }
      - { name: travel_vibes_hub, label: "Travel Vibes (hub)", file: src/travel-vibes.md, fields: *page_fields }
      - { name: destinations_hub, label: "Destinations (hub)", file: src/destinations.md, fields: *page_fields }
      - { name: insights_hub, label: "Insights (hub)", file: src/insights.md, fields: *page_fields }
      - { name: faq, label: "FAQ", file: src/faq.md, fields: *page_fields }
      - { name: creators, label: "For Creators", file: src/partners/creators.md, fields: *page_fields }
      - { name: creator_directory, label: "Creator Directory", file: src/partners/creators/directory.md, fields: *page_fields }
      - { name: industry, label: "For Industry Partners", file: src/partners/industry.md, fields: *page_fields }
      - { name: about, label: "About", file: src/about.md, fields: *page_fields }
      - { name: press, label: "Press & Media", file: src/press.md, fields: *page_fields }
      - { name: contact, label: "Contact", file: src/contact.md, fields: *page_fields }

  # ── Travel Vibes (add / remove leaf pages) ─────────────────
  - name: vibes
    label: Travel Vibes
    label_singular: Vibe
    icon: explore
    folder: src/travel-vibes
    extension: md
    format: yaml-frontmatter
    create: true
    slug: "{{title | slugify}}"
    summary: "{{title}}"
    sortable_fields: [order, title]
    fields:
      - { name: title, widget: string }
      - { label: "Sort order", name: order, widget: number, default: 99 }
      - { label: "Icon (emoji)", name: icon, widget: string }
      - { label: "Hub card summary", name: summary, widget: text }
      - { name: tagline, widget: text }
      - { name: heroImage, widget: image }
      - { name: heroAlt, widget: string, required: false }
      - { label: "What makes this trip", name: characteristics, widget: list, field: { name: point, widget: string } }
      - label: "Sample destinations"
        name: destinations
        widget: list
        fields:
          - { name: name, widget: string }
          - { name: blurb, widget: text, required: false }
          - { name: href, widget: string, required: false }
      - { name: budget, widget: string, required: false }

  # ── Destinations (curated lists) ───────────────────────────
  - name: destinations
    label: Destinations
    label_singular: List
    icon: place
    folder: src/destinations
    extension: md
    format: yaml-frontmatter
    create: true
    slug: "{{title | slugify}}"
    summary: "{{title}}"
    sortable_fields: [order, title]
    fields:
      - { name: title, widget: string }
      - { label: "Sort order", name: order, widget: number, default: 99 }
      - { label: "Icon (emoji)", name: icon, widget: string }
      - { label: "Hub card summary", name: summary, widget: text }
      - { name: tagline, widget: text }
      - { name: heroImage, widget: image }
      - { name: heroAlt, widget: string, required: false }
      - { name: listHeading, widget: string, required: false }
      - { name: intro, widget: text, required: false }
      - label: "Picks"
        name: picks
        widget: list
        fields:
          - { name: name, widget: string }
          - { name: blurb, widget: text, required: false }
          - { label: "Price note", name: priceNote, widget: string, required: false }
      - label: "Related vibe"
        name: relatedVibe
        widget: object
        required: false
        fields:
          - { name: label, widget: string }
          - { name: href, widget: string }

  # ── Insights (blog posts) ──────────────────────────────────
  - name: insights
    label: Insights
    label_singular: Post
    icon: article
    folder: src/insights
    extension: md
    format: yaml-frontmatter
    create: true
    slug: "{{title | slugify}}"
    summary: "{{title}}"
    sortable_fields: [order, title]
    fields:
      - { name: title, widget: string }
      - label: Category
        name: category
        widget: select
        options: ["Travel Inspiration", "Budget Travel", "Group Travel", "Hidden Gems", "Travel Trends", "AI & Travel"]
      - { name: author, widget: string, default: "The WhereTo Team" }
      - { name: authorTitle, widget: string, required: false }
      - { label: "Published (display text)", name: published, widget: string, required: false }
      - { label: "Last updated (display text)", name: updated, widget: string, required: false }
      - { label: "Sort order", name: order, widget: number, default: 99 }
      - { label: "Icon (emoji)", name: icon, widget: string, required: false }
      - { label: "Hub card summary", name: summary, widget: text }
      - { name: heroImage, widget: image, required: false }
      - { name: heroAlt, widget: string, required: false }
      - { label: "Post body", name: body, widget: markdown }

  # ── Legal ──────────────────────────────────────────────────
  - name: legal
    label: Legal
    icon: gavel
    files:
      - name: privacy
        label: "Website Privacy Policy"
        file: src/legal/privacy.md
        fields: &legal_fields
          - { name: title, widget: string }
          - { label: "Last updated", name: updated, widget: string }
          - { label: "SEO description", name: description, widget: text, required: false }
          - { label: "Body", name: body, widget: markdown }
      - { name: terms, label: "Website Terms of Service", file: src/legal/terms.md, fields: *legal_fields }

  # ── Site settings & navigation ─────────────────────────────
  - name: settings
    label: Settings
    icon: settings
    files:
      - name: site
        label: "Site & Navigation"
        file: src/_data/site.json
        fields:
          - { name: brandName, widget: string }
          - { label: "Nav monogram letter", name: monogram, widget: string }
          - { label: "Default SEO title", name: metaTitle, widget: string }
          - { label: "Default SEO description", name: metaDescription, widget: text }
          - { name: url, widget: string }
          - { name: contactEmail, widget: string }
          - label: "Launch mode"
            name: launchMode
            widget: select
            default: pre
            options:
              - { label: "Pre-launch (Join Early Access)", value: pre }
              - { label: "Post-launch (Get the App + store badges)", value: post }
          - label: "Nav CTA (pre / post launch)"
            name: cta
            widget: object
            fields:
              - { label: "Pre-launch", name: pre, widget: object, fields: [ { name: label, widget: string }, { name: href, widget: string } ] }
              - { label: "Post-launch", name: post, widget: object, fields: [ { name: label, widget: string }, { name: href, widget: string } ] }
          - label: "App store links"
            name: store
            widget: object
            fields:
              - { name: appleHref, widget: string }
              - { name: googleHref, widget: string }
          - label: "Form handler (Web3Forms)"
            name: forms
            widget: object
            fields:
              - { name: provider, widget: string }
              - { name: accessKey, widget: string }
          - label: "Primary navigation"
            name: nav
            widget: list
            fields: [ { name: label, widget: string }, { name: href, widget: string } ]
          - label: "Partner dropdown links"
            name: partnerNav
            widget: list
            fields: [ { name: label, widget: string }, { name: href, widget: string } ]
          - label: "Footer columns"
            name: footerCols
            widget: list
            fields:
              - { name: heading, widget: string }
              - { label: Links, name: links, widget: list, fields: [ { name: label, widget: string }, { name: href, widget: string } ] }

      - name: theme
        label: "Theme & Fonts"
        file: src/_data/theme.json
        fields:
          - label: Colors
            name: colors
            widget: object
            fields:
              - { name: cream, widget: string }
              - { name: card, widget: string }
              - { name: navy, widget: string }
              - { name: navyLight, widget: string }
              - { name: rust, widget: string }
          - { label: "Max content width (px)", name: maxWidth, widget: number }
          - label: "Heading font"
            name: headingFont
            widget: select
            options:
              - { label: "DM Serif Display", value: dm-serif }
              - { label: "Playfair Display", value: playfair }
              - { label: "Fraunces", value: fraunces }
              - { label: "Cormorant Garamond", value: cormorant }
              - { label: "Lora", value: lora }
          - label: "Body font"
            name: bodyFont
            widget: select
            options:
              - { label: "Nunito Sans", value: nunito-sans }
              - { label: "Inter", value: inter }
              - { label: "Work Sans", value: work-sans }
              - { label: "DM Sans", value: dm-sans }
              - { label: "Plus Jakarta Sans", value: plus-jakarta }
              - { label: "Figtree", value: figtree }
